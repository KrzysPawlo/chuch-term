name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            asset: chuch-term-linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-13
            asset: chuch-term-macos-intel
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: chuch-term-macos-arm

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install musl tools (Linux only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ matrix.asset }}.tar.gz chuch-term
          mv ${{ matrix.asset }}.tar.gz ../../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
          body: |
            ## Install

            **macOS (Apple Silicon):**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/chuch-term-macos-arm.tar.gz | tar xz
            sudo mv chuch-term /usr/local/bin/
            ```

            **macOS (Intel):**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/chuch-term-macos-intel.tar.gz | tar xz
            sudo mv chuch-term /usr/local/bin/
            ```

            **Linux (x86_64):**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/chuch-term-linux-x86_64.tar.gz | tar xz
            sudo mv chuch-term /usr/local/bin/
            ```

            **cargo install:**
            ```bash
            cargo install --git https://github.com/${{ github.repository }}
            ```
