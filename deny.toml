# cargo deny configuration — https://embarkstudios.github.io/cargo-deny/
# Enforces license compliance and supply-chain hygiene on every CI run.

[graph]
targets = []

[advisories]
version = 2
# Fail on any known vulnerability in the dependency tree.
ignore = []

[licenses]
version = 2
# Allowlist of SPDX identifiers for all transitive dependencies.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
# Warn on duplicate versions of the same crate (keeps the binary lean).
multiple-versions = "warn"
# Deny wildcard version requirements — all deps must be pinned with semver.
wildcards = "deny"
highlight = "all"

[sources]
# Only allow crates from crates.io — no unknown registries or git sources.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
